name: Format and Fail
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
      - uses: pre-commit/action@v3.0.1
